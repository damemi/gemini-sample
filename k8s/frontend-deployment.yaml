apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemini-sample-frontend
  labels:
    app: gemini-sample-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gemini-sample-frontend
  template:
    metadata:
      labels:
        app: gemini-sample-frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/mikeodigos/gemini-sample-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: BACKEND_URL
              value: http://gemini-sample-backend:9090
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
